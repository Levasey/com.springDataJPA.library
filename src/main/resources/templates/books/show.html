<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Show book</title>
</head>
<body>
<p th:text="${book.getTitle() + ', ' + book.getYearPublished()}">VALUE</p>
<p th:text="${'Author: ' + book.getAuthor()}">VALUE</p>

<div th:if="${owner}">
    <span>Книга сейчас у: </span> <span th:text="${owner.getName()+ ' '+owner.getSurname()}">Person Name</span>

    <form th:method="post" th:action="@{/books/{bookId}/release(bookId=${book.getBookId()})}">
        <input type="hidden" name="_method" value="patch"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="submit" value="Освободить книгу"/>
    </form>
</div>

<div th:if="${people}">
    <span>Эта книга свободна. Кому назначить ее?</span>
    <form th:method="post" th:action="@{/books/{bookId}/assign(bookId=${book.getBookId()})}">
        <input type="hidden" name="_method" value="patch"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label for="person">Выберите человека</label>
        <select name="personId" id="person">
            <option th:each="p : ${people}" th:value="${p.getPersonId()}" th:text="${p.getName()+ ' ' +p.getSurname()}">
            </option>
        </select>
        <input type="submit" value="Назначить книгу"/>
    </form>
</div>

<hr/>

<form th:method="get" th:action="@{/books/{bookId}/edit(bookId=${book.getBookId()})}">
    <input type="submit" value="Редактировать"/>
</form>

<form th:method="post" th:action="@{/books/{bookId}(bookId=${book.getBookId()})}">
    <input type="hidden" name="_method" value="delete"/>
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="submit" value="Delete"/>
</form>
</body>
</html>
