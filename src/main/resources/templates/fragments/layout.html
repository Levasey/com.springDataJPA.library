<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" th:fragment="layout (pageTitle, main)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle}">Библиотека</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&amp;family=Source+Serif+4:ital,opsz,wght@0,8..60,600;1,8..60,400&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/library.css}"/>
</head>
<body>
<a class="skip-link" href="#main-content">К содержимому</a>
<header class="site-header">
    <a class="brand" th:href="@{/books}">Библиотека</a>
    <nav class="nav-links" aria-label="Основная навигация">
        <a th:href="@{/books}"
           th:attr="aria-current=${#strings.startsWith(#httpServletRequest.requestURI, '/books') and not #strings.startsWith(#httpServletRequest.requestURI, '/books/search') ? 'page' : null}">Книги</a>
        <a th:href="@{/people}"
           th:attr="aria-current=${#strings.startsWith(#httpServletRequest.requestURI, '/people') ? 'page' : null}">Читатели</a>
        <a th:href="@{/books/search}"
           th:attr="aria-current=${#strings.startsWith(#httpServletRequest.requestURI, '/books/search') ? 'page' : null}">Поиск</a>
    </nav>
</header>
<main id="main-content" class="container">
    <th:block th:replace="${main}"/>
</main>
</body>
</html>
