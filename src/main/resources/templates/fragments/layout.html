<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout (pageTitle, main)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle}">Библиотека</title>
    <link rel="icon" th:href="@{/favicon.ico}" href="/favicon.ico" type="image/x-icon"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&amp;family=Source+Serif+4:ital,opsz,wght@0,8..60,600;1,8..60,400&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/library.css}"/>
</head>
<body>
<a class="skip-link" href="#main-content">К содержимому</a>
<header class="site-header" th:with="reqUri=${requestUri != null ? requestUri : ''}">
    <a class="brand" th:href="@{/}">Библиотека</a>
    <form sec:authorize="isAuthenticated()" class="header-search" method="get" role="search"
          th:action="@{${headerSearchUrl}}"
          th:attr="aria-label=${headerSearchReadersMode} ? 'Поиск по читателям' : 'Поиск по каталогу книг'">
        <label class="visually-hidden" for="header-search-q"
               th:text="${headerSearchReadersMode} ? 'Поиск читателей' : 'Поиск книг'">Поиск</label>
        <input type="search" id="header-search-q" name="q"
               th:value="${headerSearchQ != null ? headerSearchQ : ''}"
               autocomplete="off" enterkeyhint="search"
               th:placeholder="${headerSearchReadersMode} ? 'Имя, фамилия, email…' : 'Название, автор…'"/>
        <button type="submit" class="header-search-submit">Найти</button>
    </form>
    <nav class="nav-links" aria-label="Основная навигация">
        <a th:href="@{/books}"
           th:attr="aria-current=${#strings.startsWith(reqUri, '/books') and not (#strings.startsWith(reqUri, '/books/search')) ? 'page' : null}">Книги</a>
        <a sec:authorize="hasRole('LIBRARIAN')" th:href="@{/people}"
           th:attr="aria-current=${#strings.startsWith(reqUri, '/people') ? 'page' : null}">Читатели</a>
        <a sec:authorize="!isAuthenticated()" th:href="@{/books/search}"
           th:attr="aria-current=${#strings.startsWith(reqUri, '/books/search') ? 'page' : null}">Поиск</a>
        <a sec:authorize="hasRole('LIBRARIAN')" th:href="@{/register}"
           th:attr="aria-current=${#strings.startsWith(reqUri, '/register') ? 'page' : null}">Новый пользователь</a>
        <form sec:authorize="isAuthenticated()" class="nav-logout" th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="nav-logout-btn">Выйти</button>
        </form>
    </nav>
</header>
<main id="main-content" class="container">
    <th:block th:replace="${main}"/>
</main>
</body>
</html>
