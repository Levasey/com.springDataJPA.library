<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New book</title>
</head>
<body>

<form th:method="POST" th:action="@{/books}" th:object="${bookForm}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <label for="title">Enter book's name: </label>
    <input type="text" th:field="*{title}" id="title"/>
    <div style="color:red" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Book's name Error</div>
    <br/>
    <label for="author">Enter author: </label>
    <input type="text" th:field="*{author}" id="author"/>
    <div style="color:red" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">Author Error</div>
    <br/>
    <label for="yearPublished">Enter year of published: </label>
    <input type="text" th:field="*{yearPublished}" id="yearPublished"/>
    <div style="color:red" th:if="${#fields.hasErrors('yearPublished')}" th:errors="*{yearPublished}">Year Error</div>
    <br/>
    <input type="submit" value="Create!"/>
</form>

</body>
</html>
