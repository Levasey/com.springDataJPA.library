<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Новая книга', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title">Новая книга</h1>
    <form class="form-stack panel" style="max-width:100%;margin:0" th:method="POST" th:action="@{/books}" th:object="${bookForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="field">
            <label for="title">Название</label>
            <input type="text" th:field="*{title}" id="title" autocomplete="off"/>
            <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">ошибка</div>
        </div>
        <div class="field">
            <label for="author">Автор</label>
            <input type="text" th:field="*{author}" id="author" autocomplete="off"/>
            <div class="field-error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">ошибка</div>
        </div>
        <div class="field">
            <label for="yearPublished">Год издания</label>
            <input type="text" th:field="*{yearPublished}" id="yearPublished" inputmode="numeric"/>
            <div class="field-error" th:if="${#fields.hasErrors('yearPublished')}" th:errors="*{yearPublished}">ошибка</div>
        </div>
        <div class="field">
            <label for="genre">Жанр</label>
            <select th:field="*{genre}" id="genre">
                <option th:each="g : ${genres}" th:value="${g}" th:text="${g.displayName}">жанр</option>
            </select>
            <div class="field-error" th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}">ошибка</div>
        </div>
        <div class="actions" style="margin-top:0">
            <input class="btn btn-primary" type="submit" value="Создать"/>
            <a class="btn btn-secondary" th:href="@{/books}">Отмена</a>
        </div>
    </form>
</th:block>
</body>
</html>
