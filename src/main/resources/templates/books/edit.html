<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update book</title>
</head>
<body>

<form th:method="post" th:action="@{/books/{bookId}(bookId=${book.getBookId()})}" th:object="${book}">
    <input type="hidden" name="_method" value="patch"/>
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <label for="title">Enter book's title: </label>
    <input type="text" th:field="*{title}" id="title"/>
    <div style="color:red" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Title Error</div>
    <br/>
    <label for="author">Enter author: </label>
    <input type="text" th:field="*{author}" id="author"/>
    <div style="color:red" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">Author Error</div>
    <br/>
    <label for="yearPublished">Enter year of published: </label>
    <input type="text" th:field="*{yearPublished}" id="yearPublished"/>
    <div style="color:red" th:if="${#fields.hasErrors('yearPublished')}" th:errors="*{yearPublished}">Year Error</div>
    <br/>
    <input type="submit" value="Update!"/>
</form>

</body>
</html>
