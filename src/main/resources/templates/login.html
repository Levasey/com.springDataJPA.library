<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Вход', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title">Вход</h1>
    <p class="muted" style="margin-top:0">Пользователь после входа видит книги и поиск. Раздел «Читатели» и работа с выдачей — у библиотекаря. Читатель может войти по email или по номеру читательского билета.</p>

    <div th:if="${param.error}" class="panel" role="alert" style="border-color: var(--color-danger, #c00); margin-bottom:1rem">
        <p style="margin:0">Неверный email, номер билета или пароль. Попробуйте снова.</p>
    </div>

    <div th:if="${param.logout}" class="panel" role="status" style="border-color: var(--success); margin-bottom:1rem">
        <p style="margin:0">Вы вышли из учётной записи.</p>
    </div>

    <form class="form-stack panel" style="max-width:22rem" th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="field">
            <label for="username">Email или номер читательского билета</label>
            <input id="username" name="username" type="text" autocomplete="username" required autofocus
                   placeholder="reader@example.com или J-1001"/>
        </div>
        <div class="field">
            <label for="password">Пароль</label>
            <div class="password-wrap">
                <input id="password" name="password" type="password" autocomplete="current-password" required/>
                <button type="button" class="password-toggle" aria-controls="password" aria-pressed="false" aria-label="Показать пароль">Показать</button>
            </div>
        </div>
        <div class="actions" style="margin-top:0">
            <button type="submit" class="btn btn-primary">Войти</button>
        </div>
    </form>
    <script defer th:src="@{/js/password-toggle.js}"></script>
</th:block>
</body>
</html>
