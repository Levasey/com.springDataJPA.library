<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Новый пользователь', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title">Новый пользователь</h1>
    <p class="muted" style="margin-top:0">Создание учётной записи с ролью «читатель каталога». После сохранения сообщите пользователю имя и пароль для входа.</p>

    <div th:if="${registeredUsername}" class="panel" role="status" style="border-color: var(--success); margin-bottom:1rem">
        <p style="margin:0">Пользователь <strong th:text="${registeredUsername}">user</strong> зарегистрирован.</p>
    </div>

    <form class="form-stack panel" style="max-width:22rem" th:action="@{/register}" th:object="${registrationForm}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="field">
            <label for="username">Имя пользователя</label>
            <input id="username" th:field="*{username}" type="text" autocomplete="username" required autofocus/>
            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="field-error" style="margin:0.35rem 0 0; font-size:0.9rem; color:var(--danger)"></p>
        </div>
        <div class="field">
            <label for="password">Пароль</label>
            <div class="password-wrap">
                <input id="password" th:field="*{password}" type="password" autocomplete="new-password" required/>
                <button type="button" class="password-toggle" aria-controls="password" aria-pressed="false" aria-label="Показать пароль">Показать</button>
            </div>
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error" style="margin:0.35rem 0 0; font-size:0.9rem; color:var(--danger)"></p>
        </div>
        <div class="field">
            <label for="confirmPassword">Пароль ещё раз</label>
            <div class="password-wrap">
                <input id="confirmPassword" th:field="*{confirmPassword}" type="password" autocomplete="new-password" required/>
                <button type="button" class="password-toggle" aria-controls="confirmPassword" aria-pressed="false" aria-label="Показать пароль">Показать</button>
            </div>
            <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="field-error" style="margin:0.35rem 0 0; font-size:0.9rem; color:var(--danger)"></p>
        </div>
        <div class="actions" style="margin-top:0">
            <button type="submit" class="btn btn-primary">Создать пользователя</button>
            <a class="btn btn-secondary" th:href="@{/books}">К каталогу</a>
        </div>
    </form>
    <script defer th:src="@{/js/password-toggle.js}"></script>
</th:block>
</body>
</html>
