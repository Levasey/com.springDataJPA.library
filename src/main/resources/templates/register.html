<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Регистрация', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title">Регистрация</h1>
    <p class="muted" style="margin-top:0">Создайте учётную запись, чтобы редактировать каталог.</p>

    <form class="form-stack panel" style="max-width:22rem" th:action="@{/register}" th:object="${registrationForm}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="field">
            <label for="username">Имя пользователя</label>
            <input id="username" th:field="*{username}" type="text" autocomplete="username" required autofocus/>
            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="field-error" style="margin:0.35rem 0 0; font-size:0.9rem; color:var(--danger)"></p>
        </div>
        <div class="field">
            <label for="password">Пароль</label>
            <input id="password" th:field="*{password}" type="password" autocomplete="new-password" required/>
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error" style="margin:0.35rem 0 0; font-size:0.9rem; color:var(--danger)"></p>
        </div>
        <div class="field">
            <label for="confirmPassword">Пароль ещё раз</label>
            <input id="confirmPassword" th:field="*{confirmPassword}" type="password" autocomplete="new-password" required/>
            <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="field-error" style="margin:0.35rem 0 0; font-size:0.9rem; color:var(--danger)"></p>
        </div>
        <div class="actions" style="margin-top:0">
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            <a class="btn btn-secondary" th:href="@{/login}">Уже есть аккаунт</a>
        </div>
    </form>
</th:block>
</body>
</html>
