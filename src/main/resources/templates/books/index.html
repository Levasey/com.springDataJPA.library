<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout('Книги', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title">Книги</h1>
    <p class="sort-toolbar">
        Сортировка:
        <a th:href="@{/books(page=${booksPage.number + 1}, books_per_page=${booksPage.size}, sort_by_year=false, sort_by_genre=false)}"
           th:classappend="${!sortByYear and !sortByGenre} ? ' sort-active' : ''">по умолчанию</a>
        ·
        <a th:href="@{/books(page=${booksPage.number + 1}, books_per_page=${booksPage.size}, sort_by_year=true, sort_by_genre=false)}"
           th:classappend="${sortByYear and !sortByGenre} ? ' sort-active' : ''">по году</a>
        ·
        <a th:href="@{/books(page=${booksPage.number + 1}, books_per_page=${booksPage.size}, sort_by_year=false, sort_by_genre=true)}"
           th:classappend="${sortByGenre and !sortByYear} ? ' sort-active' : ''">по жанру</a>
        ·
        <a th:href="@{/books(page=${booksPage.number + 1}, books_per_page=${booksPage.size}, sort_by_year=true, sort_by_genre=true)}"
           th:classappend="${sortByYear and sortByGenre} ? ' sort-active' : ''">жанр и год</a>
    </p>
    <ul class="card-list">
        <li th:each="book : ${booksPage.content}">
            <a th:href="@{/books/{bookId}(bookId=${book.getBookId()})}"
               th:text="${book.getTitle() + ', ' + book.getYearPublished() + ' · ' + book.getGenre().getDisplayName()}">книга</a>
        </li>
    </ul>
    <div class="pagination" th:if="${booksPage.totalPages > 1}">
        <span th:text="|Страница ${booksPage.number + 1} из ${booksPage.totalPages} · всего ${booksPage.totalElements}|">страница</span>
        <span>
            <a th:if="${booksPage.hasPrevious()}"
               th:href="@{/books(page=${booksPage.number}, books_per_page=${booksPage.size}, sort_by_year=${sortByYear}, sort_by_genre=${sortByGenre})}">← Назад</a>
            <span th:if="${booksPage.hasPrevious() and booksPage.hasNext()}"> · </span>
            <a th:if="${booksPage.hasNext()}"
               th:href="@{/books(page=${booksPage.number + 2}, books_per_page=${booksPage.size}, sort_by_year=${sortByYear}, sort_by_genre=${sortByGenre})}">Вперёд →</a>
        </span>
    </div>
    <div class="actions" sec:authorize="hasRole('LIBRARIAN')">
        <a class="btn btn-primary" th:href="@{/books/new}">Добавить книгу</a>
    </div>
</th:block>
</body>
</html>
