<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Вход', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title">Вход</h1>
    <p class="muted" style="margin-top:0">Для изменения каталога книг и читателей нужна авторизация.</p>

    <div th:if="${param.error}" class="panel" role="alert" style="border-color: var(--color-danger, #c00); margin-bottom:1rem">
        <p style="margin:0">Неверное имя пользователя или пароль. Попробуйте снова.</p>
    </div>

    <form class="form-stack panel" style="max-width:22rem" th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="field">
            <label for="username">Имя пользователя</label>
            <input id="username" name="username" type="text" autocomplete="username" required autofocus/>
        </div>
        <div class="field">
            <label for="password">Пароль</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required/>
        </div>
        <div class="actions" style="margin-top:0">
            <button type="submit" class="btn btn-primary">Войти</button>
            <a class="btn btn-secondary" th:href="@{/books}">На каталог (без входа)</a>
        </div>
    </form>
</th:block>
</body>
</html>
