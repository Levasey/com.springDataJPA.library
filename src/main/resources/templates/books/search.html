<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout('Поиск книг', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title">Поиск книг</h1>
    <form class="form-stack panel" style="max-width:100%;margin:0 0 1.5rem" th:method="GET" th:action="@{/books/search}">
        <div class="field">
            <label for="q">Запрос</label>
            <input type="text" id="q" name="q" th:value="${q}" autocomplete="off" placeholder="Название, автор…"/>
        </div>
        <div class="actions" style="margin-top:0">
            <input class="btn btn-primary" type="submit" value="Искать"/>
        </div>
    </form>

    <div th:if="${books != null}" class="search-results">
        <p th:if="${books.isEmpty()}" class="muted" style="margin:0">Книг не найдено.</p>
        <article class="result" th:each="book : ${books}">
            <p style="margin:0 0 0.35rem">
                <a th:href="@{/books/{bookId}(bookId=${book.getBookId()})}"
                   class="result-title-link"
                   th:text="${book.getTitle()}">название</a>
                <span class="muted"
                      th:text="| · ${book.getGenre().getDisplayName()} · ${book.getAuthor()} · ${book.getYearPublished()}|"></span>
            </p>
            <p sec:authorize="hasRole('LIBRARIAN')" th:if="${book.getOwner() != null}" class="status-busy"
               style="margin:0;font-size:0.92rem">
                У читателя: <span th:text="${book.getOwner().getSurname() + ' ' + book.getOwner().getName()}"></span>
            </p>
            <p sec:authorize="!hasRole('LIBRARIAN')" th:if="${book.getOwner() != null}" class="status-busy"
               style="margin:0;font-size:0.92rem">Занята</p>
            <p th:if="${book.getOwner() == null}" class="status-free" style="margin:0;font-size:0.92rem">Свободна</p>
            <p sec:authorize="hasRole('USER')" th:if="${readBookIds != null and readBookIds.contains(book.getBookId())}"
               class="status-free" style="margin:0.35rem 0 0;font-size:0.92rem">У вас отмечена как прочитанная</p>
            <div class="actions" style="margin-top:0.5rem">
                <a class="btn btn-secondary" th:href="@{/books/{bookId}(bookId=${book.getBookId()})}">Карточка</a>
                <a sec:authorize="hasRole('LIBRARIAN')" class="btn btn-primary"
                   th:href="@{/books/{bookId}/edit(bookId=${book.getBookId()})}">Редактировать</a>
            </div>
        </article>
    </div>
</th:block>
</body>
</html>
