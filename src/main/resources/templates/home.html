<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Библиотека', ~{::main})}">
<body>
<th:block th:fragment="main">
    <section class="panel" style="max-width:36rem; margin-top:0.5rem">
        <h1 class="page-title" style="margin-top:0">Добро пожаловать</h1>
        <p class="muted" style="margin-top:0">После входа пользователь может просматривать каталог книг и искать. Учёт читателей, выдача и изменение книг доступны только библиотекарю. Учётную запись создаёт библиотекарь.</p>
        <div class="actions" style="margin-top:1.5rem; flex-wrap:wrap">
            <a class="btn btn-primary" th:href="@{/login}">Войти</a>
            <a class="btn btn-secondary" th:href="@{/books}">Каталог книг</a>
        </div>
    </section>
</th:block>
</body>
</html>
