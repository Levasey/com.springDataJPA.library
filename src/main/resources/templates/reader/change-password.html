<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Смена пароля', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title">Смена пароля</h1>
    <p class="muted" style="margin-top:0">Вход в каталог — по email или номеру читательского билета, как при входе.</p>
    <form class="form-stack panel" style="max-width:22rem" th:action="@{/me/password}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="field">
            <label for="currentPassword">Текущий пароль</label>
            <div class="password-wrap">
                <input id="currentPassword" th:field="*{currentPassword}" type="password" autocomplete="current-password" required/>
                <button type="button" class="password-toggle" aria-controls="currentPassword" aria-pressed="false" aria-label="Показать пароль">Показать</button>
            </div>
            <div class="field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}">ошибка</div>
        </div>
        <div class="field">
            <label for="newPassword">Новый пароль</label>
            <div class="password-wrap">
                <input id="newPassword" th:field="*{newPassword}" type="password" autocomplete="new-password" required/>
                <button type="button" class="password-toggle" aria-controls="newPassword" aria-pressed="false" aria-label="Показать пароль">Показать</button>
            </div>
            <div class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}">ошибка</div>
        </div>
        <div class="field">
            <label for="confirmPassword">Новый пароль ещё раз</label>
            <div class="password-wrap">
                <input id="confirmPassword" th:field="*{confirmPassword}" type="password" autocomplete="new-password" required/>
                <button type="button" class="password-toggle" aria-controls="confirmPassword" aria-pressed="false" aria-label="Показать пароль">Показать</button>
            </div>
            <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">ошибка</div>
        </div>
        <div class="actions" style="margin-top:0">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a class="btn btn-secondary" th:href="@{/me}">К карточке</a>
        </div>
    </form>
    <script defer th:src="@{/js/password-toggle.js}"></script>
</th:block>
</body>
</html>
