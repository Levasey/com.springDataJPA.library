<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Читатели', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title">Читатели</h1>
    <div th:if="${readerCatalogSetupLink}" class="panel" role="status" style="border-color: var(--success); margin-bottom:1rem">
        <p style="margin:0 0 0.5rem">Почта не отправлена или отключена — передайте читателю ссылку для <strong>установки пароля</strong>:</p>
        <p style="margin:0"><code style="user-select:all;word-break:break-all" th:text="${readerCatalogSetupLink}">link</code></p>
    </div>
    <ul class="card-list">
        <li th:each="person : ${people}">
            <a th:href="@{/people/{personId}(personId=${person.getPersonId()})}"
               th:text="${person.fullName}">читатель</a>
        </li>
    </ul>
    <div class="actions">
        <a class="btn btn-primary" th:href="@{/people/new}">Добавить читателя</a>
    </div>
</th:block>
</body>
</html>
