<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Новый читатель', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title">Новый читатель</h1>
    <p class="muted" style="margin-top:0">Для входа в каталог книг логином будет <strong>email</strong> (регистр не важен). Задайте пароль ниже и сообщите их читателю.</p>
    <form class="form-stack panel" style="max-width:100%;margin:0" th:method="POST" th:action="@{/people}" th:object="${personForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="field">
            <label for="name">Имя</label>
            <input type="text" th:field="*{name}" id="name" autocomplete="given-name"/>
            <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">ошибка</div>
        </div>
        <div class="field">
            <label for="surname">Фамилия</label>
            <input type="text" th:field="*{surname}" id="surname" autocomplete="family-name"/>
            <div class="field-error" th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}">ошибка</div>
        </div>
        <div class="field">
            <label for="patronymic">Отчество</label>
            <input type="text" th:field="*{patronymic}" id="patronymic" autocomplete="additional-name"/>
            <div class="field-error" th:if="${#fields.hasErrors('patronymic')}" th:errors="*{patronymic}">ошибка</div>
        </div>
        <div class="field">
            <label for="date_of_birth">Дата рождения</label>
            <input type="date" th:field="*{dateOfBirth}" id="date_of_birth"/>
        </div>
        <div class="field">
            <label for="reader_card_number">Номер читательского билета</label>
            <input type="text" th:field="*{readerCardNumber}" id="reader_card_number" autocomplete="off"/>
            <div class="field-error" th:if="${#fields.hasErrors('readerCardNumber')}" th:errors="*{readerCardNumber}">ошибка</div>
        </div>
        <div class="field">
            <label for="email">Электронная почта</label>
            <input type="text" th:field="*{email}" id="email" autocomplete="email"/>
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">ошибка</div>
        </div>
        <div class="field">
            <label for="password">Пароль для каталога</label>
            <div class="password-wrap">
                <input id="password" th:field="*{password}" type="password" autocomplete="new-password" required/>
                <button type="button" class="password-toggle" aria-controls="password" aria-pressed="false" aria-label="Показать пароль">Показать</button>
            </div>
            <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">ошибка</div>
        </div>
        <div class="field">
            <label for="confirmPassword">Пароль ещё раз</label>
            <div class="password-wrap">
                <input id="confirmPassword" th:field="*{confirmPassword}" type="password" autocomplete="new-password" required/>
                <button type="button" class="password-toggle" aria-controls="confirmPassword" aria-pressed="false" aria-label="Показать пароль">Показать</button>
            </div>
            <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">ошибка</div>
        </div>
        <div class="field">
            <label for="address">Адрес</label>
            <input type="text" th:field="*{address}" id="address" autocomplete="street-address"/>
            <div class="field-error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}">ошибка</div>
        </div>
        <div class="actions" style="margin-top:0">
            <input class="btn btn-primary" type="submit" value="Создать"/>
            <a class="btn btn-secondary" th:href="@{/people}">Отмена</a>
        </div>
    </form>
    <script defer th:src="@{/js/password-toggle.js}"></script>
</th:block>
</body>
</html>
