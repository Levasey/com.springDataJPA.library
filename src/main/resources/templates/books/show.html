<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout('Книга', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title" th:text="${book.getTitle()}">Название</h1>
    <div class="panel stack">
        <p class="muted" th:text="${book.getYearPublished()}">год</p>
        <p><span class="muted">Жанр:</span> <span th:text="${book.getGenre().getDisplayName()}">жанр</span></p>
        <p><span class="muted">Автор:</span> <span th:text="${book.getAuthor()}">автор</span></p>

        <div sec:authorize="hasRole('USER')" class="panel" style="margin-top:0.75rem;padding:0.85rem 1rem">
            <p th:if="${readerMarkedRead}" class="status-free" style="margin:0 0 0.65rem">У вас отмечено как прочитанная.</p>
            <p th:if="${readerMarkedRead == null or !readerMarkedRead}" class="muted" style="margin:0 0 0.65rem">
                Отметьте, если уже читали эту книгу — список хранится в вашей карточке.</p>
            <div class="actions" style="margin:0;flex-wrap:wrap;gap:0.5rem">
                <form th:if="${readerMarkedRead == null or !readerMarkedRead}" class="actions" style="margin:0"
                      th:method="post" th:action="@{/books/{bookId}/read(bookId=${book.getBookId()})}">
                    <input type="hidden" name="_method" value="patch"/>
                    <input type="hidden" name="read" value="true"/>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input class="btn btn-primary" type="submit" value="Прочитал(а)"/>
                </form>
                <form th:if="${readerMarkedRead}" class="actions" style="margin:0"
                      th:method="post" th:action="@{/books/{bookId}/read(bookId=${book.getBookId()})}">
                    <input type="hidden" name="_method" value="patch"/>
                    <input type="hidden" name="read" value="false"/>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input class="btn btn-secondary" type="submit" value="Убрать из прочитанных"/>
                </form>
            </div>
        </div>

        <div th:if="${owner}">
            <p sec:authorize="hasRole('LIBRARIAN')"><span class="muted">Сейчас у:</span>
                <span th:text="${owner.getName() + ' ' + owner.getSurname() + ' (билет ' + owner.getReaderCardNumber() + ')'}">читатель</span></p>
            <p sec:authorize="!hasRole('LIBRARIAN')" class="status-busy" style="margin:0">Занята</p>
            <form sec:authorize="hasRole('LIBRARIAN')" class="actions" style="margin-top:0" th:method="post"
                  th:action="@{/books/{bookId}/release(bookId=${book.getBookId()})}">
                <input type="hidden" name="_method" value="patch"/>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input class="btn btn-secondary" type="submit" value="Освободить книгу"/>
            </form>
        </div>

        <div sec:authorize="hasRole('LIBRARIAN')" th:if="${people}">
            <p>Книга свободна. Назначить читателю:</p>
            <form class="form-stack" style="max-width:100%" th:method="post" th:action="@{/books/{bookId}/assign(bookId=${book.getBookId()})}">
                <input type="hidden" name="_method" value="patch"/>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="field">
                    <label for="person">Читатель</label>
                    <select name="personId" id="person">
                        <option th:each="p : ${people}" th:value="${p.getPersonId()}"
                                th:text="${p.getName() + ' ' + p.getSurname() + ' — ' + p.getReaderCardNumber()}"></option>
                    </select>
                </div>
                <input class="btn btn-primary" type="submit" value="Назначить"/>
            </form>
        </div>
    </div>
    <div class="actions">
        <a class="btn btn-secondary" th:href="@{/books}">Все книги</a>
        <form sec:authorize="hasRole('LIBRARIAN')" th:method="get" th:action="@{/books/{bookId}/edit(bookId=${book.getBookId()})}">
            <input class="btn btn-primary" type="submit" value="Редактировать"/>
        </form>
        <form sec:authorize="hasRole('LIBRARIAN')" th:method="post" th:action="@{/books/{bookId}(bookId=${book.getBookId()})}"
              onsubmit="return confirm('Удалить эту книгу?');">
            <input type="hidden" name="_method" value="delete"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input class="btn btn-danger" type="submit" value="Удалить"/>
        </form>
    </div>
</th:block>
</body>
</html>
