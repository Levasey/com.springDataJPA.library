<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Моя карточка', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title" th:text="${person.fullName}">Имя</h1>
    <p th:if="${param.passwordChanged != null}" class="panel" style="border-color: var(--success, #4a9); margin-bottom:1rem">
        Пароль успешно изменён.
    </p>
    <div class="panel stack">
        <p><span class="muted">Номер читательского билета:</span> <span th:text="${person.getReaderCardNumber()}">билет</span></p>
        <p><span class="muted">Электронная почта:</span> <span th:text="${person.getEmail()}">email</span></p>
        <p th:if="${person.getAddress() != null and !person.getAddress().isBlank()}"><span class="muted">Адрес:</span> <span th:text="${person.getAddress()}">адрес</span></p>
        <p th:if="${person.getDateOfBirth() != null}"><span class="muted">Дата рождения:</span> <span th:text="${person.getDateOfBirth()}">дата</span></p>
    </div>

    <div th:if="${books.isEmpty()}" class="panel">
        <p class="muted" style="margin:0">У вас нет взятых книг.</p>
    </div>

    <div th:if="${!books.isEmpty()}" class="panel stack">
        <h2 class="page-title" style="font-size:1.15rem;margin:0 0 0.5rem">Взятые книги</h2>
        <div style="overflow-x:auto">
            <table class="book-table">
                <thead>
                <tr>
                    <th>Название</th>
                    <th>Автор</th>
                    <th>Год</th>
                    <th>Выдана</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="book : ${books}" th:classappend="${book.isExpired()} ? 'row-overdue' : ''">
                    <td>
                        <a th:href="@{/books/{id}(id=${book.getBookId()})}" th:text="${book.getTitle()}">книга</a>
                    </td>
                    <td th:text="${book.getAuthor()}">автор</td>
                    <td th:text="${book.getYearPublished()}">год</td>
                    <td>
                        <span th:text="${book.getTakenAt() != null ? #temporals.format(book.getTakenAt(), 'dd.MM.yyyy HH:mm') : '—'}">дата</span>
                        <span th:if="${book.isExpired()}" class="status-busy" style="margin-left:0.35rem;font-size:0.85em">Просрочено</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="actions" style="flex-wrap:wrap;margin-top:1.25rem">
        <a class="btn btn-primary" th:href="@{/me/password}">Сменить пароль</a>
        <form class="nav-logout" style="display:inline-flex" th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-secondary">Выйти из профиля</button>
        </form>
        <a class="btn btn-secondary" th:href="@{/books}">К каталогу</a>
    </div>
</th:block>
</body>
</html>
