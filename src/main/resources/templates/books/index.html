<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout('Книги', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title">Книги</h1>
    <form class="sort-toolbar" method="get" th:action="@{/books}">
        <input type="hidden" name="page" th:value="${booksPage.number + 1}"/>
        <input type="hidden" name="books_per_page" th:value="${booksPage.size}"/>
        <div class="sort-toolbar__row">
            <span class="sort-toolbar__label">Сортировка (можно выбрать несколько):</span>
            <label class="sort-toolbar__check"><input type="checkbox" name="sort_by_year" value="true" th:checked="${sortByYear}"/> по году</label>
            <label class="sort-toolbar__check"><input type="checkbox" name="sort_by_genre" value="true" th:checked="${sortByGenre}"/> по жанру</label>
            <label class="sort-toolbar__check"><input type="checkbox" name="sort_by_title" value="true" th:checked="${sortByTitle}"/> по названию</label>
            <label class="sort-toolbar__check"><input type="checkbox" name="sort_by_author" value="true" th:checked="${sortByAuthor}"/> по автору</label>
        </div>
        <div class="sort-toolbar__row">
            <label class="sort-toolbar__select-wrap">
                Книги:
                <select name="availability_preset">
                    <option value="all" th:selected="${availabilityPreset == 'all'}">все</option>
                    <option value="free" th:selected="${availabilityPreset == 'free'}">только свободные</option>
                    <option value="issued" th:selected="${availabilityPreset == 'issued'}">только выданные</option>
                </select>
            </label>
            <label sec:authorize="hasRole('USER')" class="sort-toolbar__check">
                <input type="checkbox" name="hide_read" value="true" th:checked="${hideRead}"/> без прочитанных
            </label>
            <button type="submit" class="btn btn-primary sort-toolbar__submit">Применить</button>
            <a class="sort-toolbar__reset" th:href="@{/books}">Сбросить</a>
        </div>
    </form>
    <ul class="card-list">
        <li th:each="book : ${booksPage.content}">
            <a th:href="@{/books/{bookId}(bookId=${book.getBookId()})}"
               th:text="${book.getTitle() + ', ' + book.getAuthor() + ', ' + book.getYearPublished() + ' · ' + book.getGenre().getDisplayName()}">книга</a>
            <span sec:authorize="hasRole('USER')" th:if="${readBookIds != null and readBookIds.contains(book.getBookId())}"
                  class="status-free" style="margin-left:0.35rem;font-size:0.88em">прочитана</span>
        </li>
    </ul>
    <div class="pagination" th:if="${booksPage.totalPages > 1}">
        <span th:text="|Страница ${booksPage.number + 1} из ${booksPage.totalPages} · всего ${booksPage.totalElements}|">страница</span>
        <span>
            <a th:if="${booksPage.hasPrevious()}"
               th:href="@{/books(page=${booksPage.number}, books_per_page=${booksPage.size}, sort_by_year=${sortByYear}, sort_by_genre=${sortByGenre}, sort_by_title=${sortByTitle}, sort_by_author=${sortByAuthor}, availability_preset=${availabilityPreset}, hide_read=${hideRead})}">← Назад</a>
            <span th:if="${booksPage.hasPrevious() and booksPage.hasNext()}"> · </span>
            <a th:if="${booksPage.hasNext()}"
               th:href="@{/books(page=${booksPage.number + 2}, books_per_page=${booksPage.size}, sort_by_year=${sortByYear}, sort_by_genre=${sortByGenre}, sort_by_title=${sortByTitle}, sort_by_author=${sortByAuthor}, availability_preset=${availabilityPreset}, hide_read=${hideRead})}">Вперёд →</a>
        </span>
    </div>
    <div class="actions" sec:authorize="hasRole('LIBRARIAN')">
        <a class="btn btn-primary" th:href="@{/books/new}">Добавить книгу</a>
    </div>
</th:block>
</body>
</html>
