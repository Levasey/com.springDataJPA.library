<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Пароль для каталога', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title">Установка пароля</h1>
    <p class="muted" style="margin-top:0">Задайте пароль для входа в каталог библиотеки. Логин — ваш email (как в письме).</p>
    <p th:if="${form.token == null || #strings.isEmpty(form.token)}" class="panel" style="border-color: var(--warning, #a60); margin-bottom:1rem">
        Откройте эту страницу по <strong>ссылке из письма</strong> библиотеки — в адресе уже будет указан токен.
    </p>
    <form class="form-stack panel" style="max-width:22rem" th:action="@{/catalog/setup-password}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" th:field="*{token}"/>
        <div class="field">
            <label for="password">Новый пароль</label>
            <div class="password-wrap">
                <input id="password" th:field="*{password}" type="password" autocomplete="new-password" required/>
                <button type="button" class="password-toggle" aria-controls="password" aria-pressed="false" aria-label="Показать пароль">Показать</button>
            </div>
            <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">ошибка</div>
        </div>
        <div class="field">
            <label for="confirmPassword">Пароль ещё раз</label>
            <div class="password-wrap">
                <input id="confirmPassword" th:field="*{confirmPassword}" type="password" autocomplete="new-password" required/>
                <button type="button" class="password-toggle" aria-controls="confirmPassword" aria-pressed="false" aria-label="Показать пароль">Показать</button>
            </div>
            <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">ошибка</div>
        </div>
        <div class="field-error" th:if="${#fields.hasErrors('token')}" th:errors="*{token}">ошибка</div>
        <div class="actions" style="margin-top:0">
            <button type="submit" class="btn btn-primary">Сохранить пароль</button>
            <a class="btn btn-secondary" th:href="@{/login}">Ко входу</a>
        </div>
    </form>
    <script defer th:src="@{/js/password-toggle.js}"></script>
</th:block>
</body>
</html>
