spring:
  mvc:
    hiddenmethod:
      filter:
        # HTML forms only send GET/POST; PATCH/DELETE rely on _method + this filter (Spring Boot 3: off by default).
        enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/library}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:${LIBRARY_DB_PASSWORD:}}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
