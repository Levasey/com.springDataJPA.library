<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Читатель', ~{::main})}">
<body>
<th:block th:fragment="main">
    <h1 class="page-title" th:text="${person.getName() + ' ' + person.getSurname()}">Имя</h1>
    <div class="panel stack">
        <p><span class="muted">Номер читательского билета:</span> <span th:text="${person.getReaderCardNumber()}">билет</span></p>
        <p><span class="muted">Электронная почта:</span> <span th:text="${person.getEmail()}">email</span></p>
        <p><span class="muted">Адрес:</span> <span th:text="${person.getAddress()}">адрес</span></p>
        <p><span class="muted">Дата рождения:</span> <span th:text="${person.getDateOfBirth()}">дата</span></p>
        <p class="muted" th:text="|ID: ${person.getPersonId()}|">id</p>
    </div>

    <div th:if="${books.isEmpty()}" class="panel">
        <p class="muted" style="margin:0">Пока нет взятых книг.</p>
    </div>

    <div th:if="${!books.isEmpty()}" class="panel stack">
        <h2 class="page-title" style="font-size:1.15rem;margin:0 0 0.5rem">Книги у читателя</h2>
        <div style="overflow-x:auto">
            <table class="book-table">
                <thead>
                <tr>
                    <th>Название</th>
                    <th>Автор</th>
                    <th>Год</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="book : ${books}">
                    <td>
                        <a th:href="@{/books/{id}(id=${book.getBookId()})}" th:text="${book.getTitle()}">книга</a>
                    </td>
                    <td th:text="${book.getAuthor()}">автор</td>
                    <td th:text="${book.getYearPublished()}">год</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="actions">
        <a class="btn btn-secondary" th:href="@{/people}">Все читатели</a>
        <form th:method="get" th:action="@{/people/{id}/edit(id=${person.getPersonId()})}">
            <input class="btn btn-primary" type="submit" value="Редактировать"/>
        </form>
        <form th:method="post" th:action="@{/people/{personId}(personId=${person.getPersonId()})}"
              onsubmit="return confirm('Удалить этого читателя?');">
            <input type="hidden" name="_method" value="delete"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input class="btn btn-danger" type="submit" value="Удалить"/>
        </form>
    </div>
</th:block>
</body>
</html>
